name: Lexical compatibility

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: Exact Lexical version or npm tag to verify
        default: latest
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: lexical-compatibility
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Lexical ${{ inputs.version || 'latest' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Update npm
        run: npm install --global npm@latest

      - name: Install project dependencies
        run: npm ci

      - name: Resolve Lexical package set
        id: lexical
        env:
          REQUESTED_VERSION: ${{ inputs.version || 'latest' }}
        shell: bash
        run: |
          version="$(npm view "lexical@${REQUESTED_VERSION}" version)"
          packages="$(node scripts/lexical-compatibility.mjs "$version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Testing Lexical $version"

      - name: Install Lexical ${{ steps.lexical.outputs.version }}
        run: npm install --no-save --package-lock=false ${{ steps.lexical.outputs.packages }}

      - name: Install browser matrix
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Check types and upstream API parity
        run: |
          npm run typecheck
          node scripts/check-api-parity.mjs --skip-documentation

      - name: Run unit and browser tests
        run: |
          npm run coverage
          npm run test:browser

      - name: Verify distributable output
        run: |
          npm run build
          npm run check:bundle-size
          npm run check:tree-shaking

      - name: Require an explicit supported Lexical minor
        run: npm run check:lexical-baseline
