name: Deploy playground to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install package dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Install playground dependencies
        run: npm ci --prefix examples/nuxt

      - name: Type-check playground
        run: npm run typecheck --prefix examples/nuxt

      - name: Generate static playground
        run: npm run generate:pages --prefix examples/nuxt
        env:
          NUXT_APP_BASE_URL: /vue-lexical/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: examples/nuxt/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
