name: Publish package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Update npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run check

      - name: Install Nuxt example dependencies
        run: npm ci --prefix examples/nuxt

      - name: Verify Nuxt SSR example
        run: npm run build --prefix examples/nuxt

      - name: Validate release version
        id: release
        shell: bash
        run: |
          package_version="$(node --print "require('./package.json').version")"
          release_version="${GITHUB_REF_NAME#v}"

          if [[ "$package_version" != "$release_version" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match package version $package_version." >&2
            exit 1
          fi

          if [[ "$package_version" == *-* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --tag "${{ steps.release.outputs.dist_tag }}"
